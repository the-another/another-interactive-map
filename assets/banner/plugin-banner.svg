<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1544 500" width="1544" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#2A1F4E"/>
    </linearGradient>
    <linearGradient id="mapFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#503AA8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#503AA8" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1544" height="500" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <g opacity="0.06" fill="#fff">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1"/>
    </pattern>
    <rect width="1544" height="500" fill="url(#dots)"/>
  </g>

  <!-- Map region — simplified US + Canada as connected tile grid (right side) -->
  <g transform="translate(780, 30)">
    <!-- Row 1 — Northern Canada -->
    <rect x="120" y="0"  width="56" height="42" rx="4" fill="#503AA8" opacity="0.15" stroke="#F6CFF4" stroke-opacity="0.12" stroke-width="1"/>
    <rect x="180" y="0"  width="56" height="42" rx="4" fill="#503AA8" opacity="0.12" stroke="#F6CFF4" stroke-opacity="0.12" stroke-width="1"/>
    <rect x="240" y="0"  width="56" height="42" rx="4" fill="#503AA8" opacity="0.10" stroke="#F6CFF4" stroke-opacity="0.12" stroke-width="1"/>
    <rect x="300" y="0"  width="56" height="42" rx="4" fill="#503AA8" opacity="0.12" stroke="#F6CFF4" stroke-opacity="0.12" stroke-width="1"/>

    <!-- Row 2 — Southern Canada -->
    <rect x="60"  y="48" width="56" height="42" rx="4" fill="#503AA8" opacity="0.15" stroke="#F6CFF4" stroke-opacity="0.15" stroke-width="1"/>
    <rect x="120" y="48" width="56" height="42" rx="4" fill="#503AA8" opacity="0.18" stroke="#F6CFF4" stroke-opacity="0.15" stroke-width="1"/>
    <rect x="180" y="48" width="56" height="42" rx="4" fill="#503AA8" opacity="0.20" stroke="#F6CFF4" stroke-opacity="0.15" stroke-width="1"/>
    <rect x="240" y="48" width="56" height="42" rx="4" fill="#503AA8" opacity="0.18" stroke="#F6CFF4" stroke-opacity="0.15" stroke-width="1"/>
    <rect x="300" y="48" width="56" height="42" rx="4" fill="#503AA8" opacity="0.15" stroke="#F6CFF4" stroke-opacity="0.15" stroke-width="1"/>
    <rect x="360" y="48" width="56" height="42" rx="4" fill="#503AA8" opacity="0.12" stroke="#F6CFF4" stroke-opacity="0.15" stroke-width="1"/>

    <!-- Row 3 — Northern US / border -->
    <rect x="60"  y="96" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.12" stroke="#F6CFF4" stroke-opacity="0.18" stroke-width="1"/>
    <rect x="120" y="96" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.15" stroke="#F6CFF4" stroke-opacity="0.18" stroke-width="1"/>
    <rect x="180" y="96" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.18" stroke="#F6CFF4" stroke-opacity="0.18" stroke-width="1"/>
    <rect x="240" y="96" width="56" height="42" rx="4" fill="#fead32" opacity="0.25" stroke="#fead32" stroke-opacity="0.35" stroke-width="1.5"/>
    <rect x="300" y="96" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.18" stroke="#F6CFF4" stroke-opacity="0.18" stroke-width="1"/>
    <rect x="360" y="96" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.15" stroke="#F6CFF4" stroke-opacity="0.18" stroke-width="1"/>
    <rect x="420" y="96" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.10" stroke="#F6CFF4" stroke-opacity="0.15" stroke-width="1"/>

    <!-- Row 4 — Central US -->
    <rect x="0"   y="144" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.08" stroke="#F6CFF4" stroke-opacity="0.15" stroke-width="1"/>
    <rect x="60"  y="144" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.12" stroke="#F6CFF4" stroke-opacity="0.18" stroke-width="1"/>
    <rect x="120" y="144" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.15" stroke="#F6CFF4" stroke-opacity="0.18" stroke-width="1"/>
    <rect x="180" y="144" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.20" stroke="#F6CFF4" stroke-opacity="0.20" stroke-width="1"/>
    <rect x="240" y="144" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.22" stroke="#F6CFF4" stroke-opacity="0.20" stroke-width="1"/>
    <rect x="300" y="144" width="56" height="42" rx="4" fill="#fead32" opacity="0.30" stroke="#fead32" stroke-opacity="0.40" stroke-width="1.5"/>
    <rect x="360" y="144" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.18" stroke="#F6CFF4" stroke-opacity="0.18" stroke-width="1"/>
    <rect x="420" y="144" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.12" stroke="#F6CFF4" stroke-opacity="0.15" stroke-width="1"/>

    <!-- Row 5 — Southern US -->
    <rect x="60"  y="192" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.10" stroke="#F6CFF4" stroke-opacity="0.15" stroke-width="1"/>
    <rect x="120" y="192" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.12" stroke="#F6CFF4" stroke-opacity="0.18" stroke-width="1"/>
    <rect x="180" y="192" width="56" height="42" rx="4" fill="#fead32" opacity="0.20" stroke="#fead32" stroke-opacity="0.30" stroke-width="1.5"/>
    <rect x="240" y="192" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.18" stroke="#F6CFF4" stroke-opacity="0.18" stroke-width="1"/>
    <rect x="300" y="192" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.15" stroke="#F6CFF4" stroke-opacity="0.18" stroke-width="1"/>
    <rect x="360" y="192" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.12" stroke="#F6CFF4" stroke-opacity="0.15" stroke-width="1"/>

    <!-- Row 6 — Gulf / Southern tip -->
    <rect x="120" y="240" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.08" stroke="#F6CFF4" stroke-opacity="0.12" stroke-width="1"/>
    <rect x="180" y="240" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.10" stroke="#F6CFF4" stroke-opacity="0.12" stroke-width="1"/>
    <rect x="240" y="240" width="56" height="42" rx="4" fill="#F6CFF4" opacity="0.08" stroke="#F6CFF4" stroke-opacity="0.12" stroke-width="1"/>

    <!-- Hover cursor on highlighted state -->
    <g transform="translate(270, 105)" filter="url(#glow)">
      <path d="M0,0 L0,22 L6,17 L11,26 L14,24 L10,15 L17,15 Z" fill="#fff" opacity="0.9"/>
    </g>

    <!-- State labels on highlighted cells -->
    <text x="268" y="124" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600" opacity="0.8">OH</text>
    <text x="328" y="172" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600" opacity="0.8">NC</text>
    <text x="208" y="220" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600" opacity="0.7">TX</text>
  </g>

  <!-- Gradient fade from left to blend text area -->
  <rect x="0" y="0" width="780" height="500" fill="url(#bg)" opacity="0.5"/>

  <!-- Plugin name -->
  <g transform="translate(80, 145)">
    <text font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF" letter-spacing="-1">
      <tspan x="0" y="0">Another</tspan>
      <tspan x="0" y="76">Interactive Map</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <text x="80" y="310" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#abb8c3" opacity="0.9" letter-spacing="0.5">
    Interactive SVG map block for WordPress
  </text>

  <!-- Feature pills -->
  <g transform="translate(80, 345)">
    <rect x="0" y="0" width="150" height="34" rx="17" fill="#fff" fill-opacity="0.07" stroke="#fead32" stroke-opacity="0.4" stroke-width="1"/>
    <text x="75" y="22" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#fead32" text-anchor="middle" opacity="0.9">63 Regions</text>

    <rect x="164" y="0" width="185" height="34" rx="17" fill="#fff" fill-opacity="0.07" stroke="#fead32" stroke-opacity="0.4" stroke-width="1"/>
    <text x="256" y="22" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#fead32" text-anchor="middle" opacity="0.9">Custom Colors</text>

    <rect x="363" y="0" width="175" height="34" rx="17" fill="#fff" fill-opacity="0.07" stroke="#fead32" stroke-opacity="0.4" stroke-width="1"/>
    <text x="450" y="22" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#fead32" text-anchor="middle" opacity="0.9">Click Actions</text>
  </g>

  <!-- Gutenberg badge -->
  <g transform="translate(80, 405)">
    <rect x="0" y="0" width="175" height="32" rx="16" fill="#503AA8" fill-opacity="0.3" stroke="#503AA8" stroke-opacity="0.5" stroke-width="1"/>
    <text x="88" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#F6CFF4" text-anchor="middle" font-weight="600">Gutenberg Block</text>
  </g>

  <!-- Color swatches -->
  <g transform="translate(275, 410)">
    <rect x="0" y="0" width="24" height="24" rx="5" fill="#FBFAF3" stroke="#fff" stroke-width="1" opacity="0.85"/>
    <rect x="30" y="0" width="24" height="24" rx="5" fill="#fead32" stroke="#fff" stroke-width="1" opacity="0.85"/>
    <rect x="60" y="0" width="24" height="24" rx="5" fill="#503AA8" stroke="#fff" stroke-width="1" opacity="0.85"/>
    <rect x="90" y="0" width="24" height="24" rx="5" fill="#F6CFF4" stroke="#fff" stroke-width="1" opacity="0.85"/>
  </g>
</svg>